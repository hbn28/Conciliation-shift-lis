name: conciliacao

services:
  conciliacao:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conciliacao-rede-shift
    ports:
      - "8001:8001"
    environment:
      # Login local apenas — usuário: admin / senha: admin123
      # Gerado com scripts/hash_password.py. Para produção, troque a senha
      # e gere um novo hash (nunca comitar senha em texto puro).
      APP_USERS: "admin:pbkdf2$$120000$$af54b40fe1e4ec0c19ba18ed01cd7a00$$5f3b004d912a87212bc2e89aa57e9734ac48c2744a4e6d7c1b74581f597e5019"
    volumes:
      - conciliacao_data:/app/app/storage
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  conciliacao_data:
    name: conciliacao_rede_shift_data
